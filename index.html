<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Networking Event - အုပ်စုခွဲခြင်း စာရင်းသွင်းရန်</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Myanmar:wght@400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#161a1f; --card:#1d2229; --border:#2a3038;
    --accent:#7fa88f; --accent2:#a9b98e; --text:#e6e8eb;
    --muted:#8a919c; --success:#7fb685; --danger:#c97f7f; --gold:#c9ab7f;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Noto Sans Myanmar',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  .container{max-width:960px;margin:0 auto;padding:40px 20px;}

  /* ── HEADER ── */
  .header{text-align:center;margin-bottom:36px;}
  .event-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(127,168,143,0.08);border:1px solid rgba(127,168,143,0.25);border-radius:100px;padding:6px 16px;font-size:12px;color:var(--accent);font-family:'IBM Plex Mono',monospace;letter-spacing:0.06em;margin-bottom:18px;}
  h1{font-size:clamp(24px,4.5vw,36px);font-weight:700;color:var(--text);line-height:1.4;margin-bottom:10px;}
  .subtitle{color:var(--muted);font-size:14px;line-height:1.7;max-width:520px;margin:0 auto;}

  .layout{display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start;}
  @media(max-width:680px){.layout{grid-template-columns:1fr}}

  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:28px;}
  .card-title{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;color:var(--accent);display:flex;align-items:center;gap:8px;margin-bottom:22px;text-transform:uppercase;letter-spacing:0.05em;}
  .field{margin-bottom:18px;}
  label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-family:'IBM Plex Mono',monospace;letter-spacing:0.03em;}
  label span.req{color:var(--accent);margin-left:2px;}
  input,textarea,select{width:100%;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:8px;padding:11px 14px;color:var(--text);font-family:'Noto Sans Myanmar',sans-serif;font-size:14px;transition:border-color 0.2s;outline:none;resize:none;}
  input:focus,textarea:focus,select:focus{border-color:var(--accent);}
  select option{background:#232a32;color:var(--text);}

  .radio-row{display:flex;gap:10px;}
  .radio-opt{flex:1;position:relative;}
  .radio-opt input{position:absolute;opacity:0;width:0;height:0;}
  .radio-opt label{display:flex;align-items:center;justify-content:center;padding:11px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:8px;font-family:'Noto Sans Myanmar',sans-serif;font-size:14px;color:var(--muted);cursor:pointer;margin:0;transition:all 0.15s;}
  .radio-opt input:checked + label{border-color:var(--accent);color:var(--accent);background:rgba(127,168,143,0.08);}

  .submit-btn{width:100%;padding:13px;background:var(--accent);border:none;border-radius:9px;color:#161a1f;font-family:'Noto Sans Myanmar',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:opacity 0.2s;margin-top:8px;}
  .submit-btn:hover{opacity:.88;}
  .submit-btn:disabled{opacity:0.5;cursor:not-allowed;}
  .success-banner{display:none;background:rgba(127,182,133,0.1);border:1px solid rgba(127,182,133,0.3);border-radius:9px;padding:14px 18px;margin-top:16px;font-size:14px;color:var(--success);text-align:center;line-height:1.6;}

  .list-header{background:var(--card);border:1px solid var(--border);border-radius:14px 14px 0 0;padding:18px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
  .list-title{font-family:'IBM Plex Mono',monospace;font-size:12px;text-transform:uppercase;letter-spacing:0.05em;color:var(--accent);}
  .count-badge{background:rgba(127,168,143,0.1);border:1px solid rgba(127,168,143,0.25);color:var(--accent);font-family:'IBM Plex Mono',monospace;font-size:12px;padding:3px 10px;border-radius:100px;}

  .lock-overlay{background:var(--card);border:1px solid var(--border);border-top:none;border-radius:0 0 14px 14px;padding:40px 24px;text-align:center;}
  .lock-icon{font-size:28px;margin-bottom:14px;opacity:0.7;}
  .lock-label{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:10px;}
  .lock-input-row{display:flex;gap:8px;max-width:280px;margin:0 auto;}
  .lock-input{flex:1;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:14px;outline:none;}
  .lock-input:focus{border-color:var(--accent);}
  .lock-btn{padding:10px 16px;background:var(--accent);border:none;border-radius:8px;color:#161a1f;font-family:'IBM Plex Mono',monospace;font-size:12px;cursor:pointer;white-space:nowrap;font-weight:600;}
  .lock-error{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--danger);margin-top:10px;min-height:16px;}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}

  .list-body{background:var(--card);border:1px solid var(--border);border-top:none;border-radius:0 0 14px 14px;max-height:440px;overflow-y:auto;display:none;}
  .list-body::-webkit-scrollbar{width:4px;}
  .list-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
  .empty-state{padding:48px 24px;text-align:center;color:var(--muted);}
  .empty-icon{font-size:32px;margin-bottom:12px;opacity:0.3;}
  .empty-text{font-size:13px;font-family:'IBM Plex Mono',monospace;}

  .participant{padding:16px 20px;border-bottom:1px solid var(--border);transition:background 0.2s;}
  .participant:last-child{border-bottom:none;}
  .participant:hover{background:rgba(255,255,255,0.02);}
  .p-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;}
  .p-left{display:flex;align-items:center;gap:10px;}
  .p-avatar{width:32px;height:32px;border-radius:8px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#161a1f;flex-shrink:0;font-family:'IBM Plex Mono',monospace;}
  .p-name{font-size:14px;font-weight:600;color:var(--text);}
  .p-num{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);}
  .p-tags{display:flex;gap:6px;flex-wrap:wrap;}
  .tag{font-size:10px;padding:3px 9px;border-radius:5px;font-family:'IBM Plex Mono',monospace;}
  .tag-topic{background:rgba(169,185,142,0.12);border:1px solid rgba(169,185,142,0.3);color:var(--accent2);}
  .tag-fac-yes{background:rgba(127,182,133,0.12);border:1px solid rgba(127,182,133,0.3);color:var(--success);}
  .tag-fac-no{background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--muted);}
  .del-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:2px 6px;border-radius:4px;font-size:14px;}
  .del-btn:hover{color:var(--danger);background:rgba(201,127,127,0.1);}
  .p-note{font-size:11px;color:var(--muted);margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-style:italic;}

  .export-bar{margin-top:12px;display:none;gap:8px;}
  .export-btn{flex:1;padding:10px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:11px;cursor:pointer;text-transform:uppercase;letter-spacing:0.04em;}
  .export-btn:hover{border-color:var(--accent);color:var(--accent);}
  .lock-again-btn{margin-top:8px;width:100%;padding:8px;background:none;border:1px solid rgba(201,127,127,0.2);border-radius:8px;color:rgba(201,127,127,0.6);font-family:'IBM Plex Mono',monospace;font-size:10px;cursor:pointer;display:none;text-transform:uppercase;letter-spacing:0.04em;}
  .lock-again-btn:hover{border-color:var(--danger);color:var(--danger);}

  .spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(0,0,0,0.2);border-top-color:#161a1f;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px;}
  @keyframes spin{to{transform:rotate(360deg)}}

  .toast{position:fixed;bottom:24px;right:24px;background:var(--success);color:#161a1f;padding:12px 20px;border-radius:9px;font-size:13px;font-family:'IBM Plex Mono',monospace;transform:translateY(80px);opacity:0;transition:all 0.3s ease;z-index:999;pointer-events:none;font-weight:600;}
  .toast.show{transform:translateY(0);opacity:1;}
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="event-badge">✦ Group Sign-up</div>
    <h1>Networking Event<br>အုပ်စုခွဲခြင်း (Topic Groups)</h1>
    <div class="subtitle">ကိုယ့်နယ်ပယ်နဲ့ အကိုက်ညီဆုံး Topic Group ထဲရောက်ဖို့ အောက်ပါ ပုံစံလေးကို ဖြည့်ပေးပါ</div>
  </div>

  <div class="layout">
    <!-- PUBLIC FORM -->
    <div class="card">
      <div class="card-title"><span>✦</span> Sign-up Form</div>
      <div class="field">
        <label>နာမည် (သို့) လုပ်ငန်းအမည် <span class="req">*</span></label>
        <input type="text" id="inp-name" placeholder="အမည် (သို့) Business Name">
      </div>
      <div class="field">
        <label>ဆွေးနွေး/လေ့လာချင်တဲ့ Topic <span class="req">*</span></label>
        <select id="inp-topic">
          <option value="">-- ရွေးချယ်ပါ --</option>
          <option>Digital Marketing</option>
          <option>E-commerce</option>
          <option>AI Tools</option>
          <option>Finance / Investment</option>
          <option>Remittance & Money Transfer</option>
          <option>Property</option>
          <option>Community Building</option>
          <option value="__other__">အခြား (Other)</option>
        </select>
      </div>
      <div class="field" id="topic-other-field" style="display:none">
        <label>Topic အသေးစိတ်</label>
        <input type="text" id="inp-topic-other" placeholder="Topic အမည် ရေးပါ">
      </div>
      <div class="field">
        <label>Facilitator အနေနဲ့ တာဝန်ယူပေးနိုင်မလား? <span class="req">*</span></label>
        <div class="radio-row">
          <div class="radio-opt">
            <input type="radio" name="facilitator" id="fac-yes" value="Yes">
            <label for="fac-yes">Yes</label>
          </div>
          <div class="radio-opt">
            <input type="radio" name="facilitator" id="fac-no" value="No">
            <label for="fac-no">No</label>
          </div>
        </div>
      </div>
      <div class="field">
        <label>မှတ်ချက် (ထပ်ဆောင်း)</label>
        <input type="text" id="inp-note" placeholder="အခြားပြောချင်သည့် အချက်များ... (ရှိလျှင်)">
      </div>
      <button class="submit-btn" id="submit-btn" onclick="addParticipant()">+ စာရင်းသွင်းမည်</button>
      <div class="success-banner" id="success-banner"></div>
    </div>

    <!-- ADMIN LIST -->
    <div class="list-panel">
      <div class="list-header">
        <div class="list-title">✦ Sign-ups</div>
        <div class="count-badge" id="count-badge">— ယောက်</div>
      </div>
      <div class="lock-overlay" id="lock-overlay">
        <div class="lock-icon">🔒</div>
        <div class="lock-label">Admin သာ ကြည့်ရှုနိုင်သည်</div>
        <div class="lock-input-row">
          <input type="password" class="lock-input" id="lock-pw" placeholder="Password" onkeydown="if(event.key==='Enter')unlock()">
          <button class="lock-btn" onclick="unlock()">ဖွင့်</button>
        </div>
        <div class="lock-error" id="lock-error"></div>
      </div>
      <div class="list-body" id="list-body"></div>
      <div class="export-bar" id="export-bar">
        <button class="export-btn" onclick="exportCSV()">⬇ CSV</button>
        <button class="export-btn" onclick="copyAll()">⎘ Copy</button>
        <button class="export-btn" onclick="clearAll()" style="color:#c97f7f88;border-color:#c97f7f22">✕ Clear</button>
      </div>
      <button class="lock-again-btn" id="lock-again-btn" onclick="lockList()">🔒 Lock</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, onSnapshot, query, orderBy, getCountFromServer }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAGqLZXeuoB3s770Po45gVxNZmck8b64eI",
    authDomain: "meet-event-3c234.firebaseapp.com",
    projectId: "meet-event-3c234",
    storageBucket: "meet-event-3c234.firebasestorage.app",
    messagingSenderId: "1057488937023",
    appId: "1:1057488937023:web:489becc3a0f89a18a1588a"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);
  const col = collection(db, "topic_signups");

  const PASS = 'Sitnaing2026';
  const SESSION_KEY = 'topic_signup_unlocked';

  async function refreshCount() {
    try {
      const snap = await getCountFromServer(col);
      document.getElementById('count-badge').textContent = snap.data().count + ' ယောက်';
    } catch(e) {}
  }
  refreshCount();

  document.getElementById('inp-topic').addEventListener('change', function() {
    document.getElementById('topic-other-field').style.display = this.value === '__other__' ? 'block' : 'none';
  });

  window.unlock = function() {
    const val = document.getElementById('lock-pw').value;
    if (val === PASS) {
      sessionStorage.setItem(SESSION_KEY, '1');
      showList();
    } else {
      const row = document.querySelector('.lock-input-row');
      const err = document.getElementById('lock-error');
      err.textContent = '✕ Password မှားနေသည်';
      row.style.animation = 'none';
      void row.offsetWidth;
      row.style.animation = 'shake 0.4s ease';
      document.getElementById('lock-pw').value = '';
      setTimeout(() => err.textContent = '', 2500);
    }
  };

  let unsubscribe = null;

  function showList() {
    document.getElementById('lock-overlay').style.display = 'none';
    document.getElementById('list-body').style.display = 'block';
    document.getElementById('export-bar').style.display = 'flex';
    document.getElementById('lock-again-btn').style.display = 'block';
    const q = query(col, orderBy("ts", "desc"));
    unsubscribe = onSnapshot(q, snap => {
      participants = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderList();
      document.getElementById('count-badge').textContent = participants.length + ' ယောက်';
    });
  }

  window.lockList = function() {
    sessionStorage.removeItem(SESSION_KEY);
    if (unsubscribe) { unsubscribe(); unsubscribe = null; }
    document.getElementById('lock-overlay').style.display = 'block';
    document.getElementById('list-body').style.display = 'none';
    document.getElementById('export-bar').style.display = 'none';
    document.getElementById('lock-again-btn').style.display = 'none';
    document.getElementById('lock-pw').value = '';
    document.getElementById('lock-error').textContent = '';
    refreshCount();
  };

  if (sessionStorage.getItem(SESSION_KEY) === '1') showList();

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  let participants = [];

  window.addParticipant = async function() {
    const name = document.getElementById('inp-name').value.trim();
    const topicSel = document.getElementById('inp-topic').value;
    const topicOther = document.getElementById('inp-topic-other').value.trim();
    const topic = topicSel === '__other__' ? topicOther : topicSel;
    const facEl = document.querySelector('input[name="facilitator"]:checked');
    const facilitator = facEl ? facEl.value : '';
    const note = document.getElementById('inp-note').value.trim();

    if (!name || !topic || !facilitator) {
      showToast('⚠ ကြယ်ပွင့်ပါသောနေရာများ ဖြည့်ပေးပါ'); return;
    }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>သိမ်းဆည်းနေသည်...';

    try {
      await addDoc(col, {
        name, topic, facilitator,
        note: note || '—',
        time: new Date().toLocaleString('en-GB'),
        ts: Date.now()
      });
      document.getElementById('inp-name').value = '';
      document.getElementById('inp-topic').value = '';
      document.getElementById('inp-topic-other').value = '';
      document.getElementById('topic-other-field').style.display = 'none';
      document.getElementById('inp-note').value = '';
      if (facEl) facEl.checked = false;
      const banner = document.getElementById('success-banner');
      banner.style.display = 'block';
      banner.textContent = `✓ ${name} — စာရင်းသွင်းပြီးပါပြီ။ ကျေးဇူးတင်ပါသည်!`;
      setTimeout(() => banner.style.display = 'none', 4000);
      refreshCount();
    } catch(e) {
      showToast('⚠ Error: ' + e.message);
    }
    btn.disabled = false;
    btn.innerHTML = '+ စာရင်းသွင်းမည်';
  };

  function getInitials(n) { return n.trim().charAt(0).toUpperCase(); }

  function renderList() {
    const body = document.getElementById('list-body');
    if (!participants.length) {
      body.innerHTML = '<div class="empty-state"><div class="empty-icon">○</div><div class="empty-text">No sign-ups yet</div></div>';
      return;
    }
    body.innerHTML = participants.map((p,i) => `
      <div class="participant">
        <div class="p-top">
          <div class="p-left">
            <div class="p-avatar">${getInitials(p.name)}</div>
            <div class="p-name">${p.name}</div>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <div class="p-num">#${String(participants.length-i).padStart(3,'0')}</div>
            <button class="del-btn" onclick="deleteP('${p.id}')">✕</button>
          </div>
        </div>
        <div class="p-tags">
          <span class="tag tag-topic">${p.topic}</span>
          <span class="tag ${p.facilitator==='Yes'?'tag-fac-yes':'tag-fac-no'}">Facilitator: ${p.facilitator}</span>
        </div>
        ${p.note && p.note !== '—' ? `<div class="p-note">${p.note}</div>` : ''}
      </div>`
    ).join('');
  }

  window.deleteP = async function(id) {
    if (!confirm('ဖျက်မှာသေချာပါသလား?')) return;
    try {
      await deleteDoc(doc(db, "topic_signups", id));
      showToast('✕ ဖျက်ပြီးပါပြီ');
    } catch(e) { showToast('⚠ ' + e.message); }
  };

  window.exportCSV = function() {
    if(!participants.length){showToast('⚠ Data မရှိသေး');return;}
    const h=['No','Name','Topic','Facilitator','Note','Time'];
    const rows=participants.map((p,i)=>[participants.length-i,p.name,p.topic,p.facilitator,p.note||'—',p.time]);
    const csv=[h,...rows].map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'}));
    a.download=`topic-signups-${Date.now()}.csv`; a.click();
    showToast('✓ CSV ထုတ်ပြီးပါပြီ');
  };

  window.copyAll = function() {
    if(!participants.length){showToast('⚠ Data မရှိသေး');return;}
    const lines=participants.map((p,i)=>`[${participants.length-i}] ${p.name} | ${p.topic} | Facilitator: ${p.facilitator}${p.note&&p.note!=='—'?` | Note: ${p.note}`:''}`).join('\n');
    navigator.clipboard.writeText(lines).then(()=>showToast('✓ Clipboard သို့ ကူးပြီးပါပြီ'));
  };

  window.clearAll = async function() {
    if(!participants.length) return;
    if(!confirm('စာရင်းအားလုံး ဖျက်မှာသေချာပါသလား?')) return;
    try {
      const snap=await getDocs(col);
      await Promise.all(snap.docs.map(d=>deleteDoc(doc(db,"topic_signups",d.id))));
      showToast('✕ Clear ပြီးပါပြီ');
    } catch(e){showToast('⚠ '+e.message);}
  };
</script>
</body>
</html>
