<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meet Event - စာရင်းသွင်းရန်</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Myanmar:wght@400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0f1e; --card:#111827; --border:#1e2d45;
    --accent:#00d4ff; --accent2:#7c3aed; --text:#e2e8f0;
    --muted:#64748b; --success:#10b981; --danger:#ef4444; --gold:#f59e0b;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Noto Sans Myanmar',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 30% 20%,rgba(0,212,255,0.04) 0%,transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(124,58,237,0.04) 0%,transparent 50%);pointer-events:none;z-index:0;}
  .container{max-width:960px;margin:0 auto;padding:40px 20px;position:relative;z-index:1;}
  .header{text-align:center;margin-bottom:48px;}
  .event-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(0,212,255,0.08);border:1px solid rgba(0,212,255,0.25);border-radius:100px;padding:6px 16px;font-size:12px;color:var(--accent);font-family:'IBM Plex Mono',monospace;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:20px;animation:fadeDown 0.6s ease;}
  .event-badge::before{content:'';width:6px;height:6px;background:var(--accent);border-radius:50%;animation:pulse 1.5s infinite;}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(1.4)}}
  h1{font-size:clamp(28px,5vw,44px);font-weight:700;background:linear-gradient(135deg,#fff 0%,var(--accent) 50%,var(--accent2) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.3;margin-bottom:12px;animation:fadeDown 0.6s ease 0.1s both;}
  .subtitle{color:var(--muted);font-size:14px;animation:fadeDown 0.6s ease 0.2s both;}
  @keyframes fadeDown{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  
  /* NEW EVENT INFO STYLE */
  .event-info-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 12px;
    max-width: 700px;
    margin: 28px auto 0 auto;
    animation: fadeDown 0.6s ease 0.15s both;
  }
  .info-card {
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    text-align: left;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .info-card::before {
    content: ''; position: absolute; left: 0; top: 25%; bottom: 25%; width: 3px; background: var(--accent); border-radius: 0 4px 4px 0;
  }
  .info-card.loc-card::before {
    background: var(--accent2);
  }
  .info-label {
    display: block; font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 0.05em; margin-bottom: 4px;
  }
  .info-val {
    display: block; font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.4;
  }

  .layout{display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start;}
  @media(max-width:680px){.layout{grid-template-columns:1fr}}
  .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;animation:fadeUp 0.6s ease 0.3s both;position:relative;overflow:hidden;}
  .card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));}
  .card-title{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;color:var(--accent);display:flex;align-items:center;gap:8px;margin-bottom:24px;text-transform:uppercase;letter-spacing:0.06em;}
  .field{margin-bottom:18px;}
  label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-family:'IBM Plex Mono',monospace;letter-spacing:0.05em;}
  label span.req{color:var(--accent);margin-left:2px;}
  input,textarea,select{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:8px;padding:11px 14px;color:var(--text);font-family:'Noto Sans Myanmar',sans-serif;font-size:14px;transition:border-color 0.2s,background 0.2s;outline:none;resize:none;}
  input:focus,textarea:focus,select:focus{border-color:var(--accent);background:rgba(0,212,255,0.04);}
  select option{background:#1a2233;color:var(--text);}
  textarea{height:80px;}
  .phone-row{display:flex;gap:8px;}
  .phone-prefix{width:80px;flex-shrink:0;text-align:center;color:var(--accent);font-family:'IBM Plex Mono',monospace;font-size:13px;}
  .submit-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:10px;color:white;font-family:'Noto Sans Myanmar',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:opacity 0.2s,transform 0.15s;margin-top:8px;}
  .submit-btn:hover{opacity:.9;transform:translateY(-1px);}
  .submit-btn:active{transform:translateY(0);}
  .submit-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
  .success-banner{display:none;background:rgba(16,185,129,0.12);border:1px solid rgba(16,185,129,0.3);border-radius:10px;padding:14px 18px;margin-top:16px;font-size:14px;color:#34d399;text-align:center;line-height:1.6;}

  /* LIST PANEL */
  .list-panel{animation:fadeUp 0.6s ease 0.45s both;}
  .list-header{background:var(--card);border:1px solid var(--border);border-radius:16px 16px 0 0;padding:20px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);position:relative;overflow:hidden;}
  .list-header::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent2),var(--accent));}
  .list-title{font-family:'IBM Plex Mono',monospace;font-size:13px;text-transform:uppercase;letter-spacing:0.06em;color:var(--accent);}
  .count-badge{background:rgba(0,212,255,0.12);border:1px solid rgba(0,212,255,0.3);color:var(--accent);font-family:'IBM Plex Mono',monospace;font-size:12px;padding:3px 10px;border-radius:100px;}

  /* LOCK */
  .lock-overlay{background:var(--card);border:1px solid var(--border);border-top:none;border-radius:0 0 16px 16px;padding:40px 24px;text-align:center;}
  .lock-icon{font-size:32px;margin-bottom:16px;}
  .lock-label{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px;}
  .lock-input-row{display:flex;gap:8px;max-width:280px;margin:0 auto;}
  .lock-input{flex:1;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:14px;letter-spacing:0.08em;outline:none;transition:border-color 0.2s;}
  .lock-input:focus{border-color:var(--accent);}
  .lock-btn{padding:10px 16px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:8px;color:white;font-family:'IBM Plex Mono',monospace;font-size:12px;cursor:pointer;white-space:nowrap;}
  .lock-error{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--danger);margin-top:10px;min-height:16px;}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}

  .list-body{background:var(--card);border:1px solid var(--border);border-top:none;border-radius:0 0 16px 16px;max-height:420px;overflow-y:auto;display:none;}
  .list-body::-webkit-scrollbar{width:4px;}
  .list-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
  .empty-state{padding:48px 24px;text-align:center;color:var(--muted);}
  .empty-icon{font-size:36px;margin-bottom:12px;opacity:0.3;}
  .empty-text{font-size:13px;font-family:'IBM Plex Mono',monospace;}

  .participant{padding:16px 20px;border-bottom:1px solid rgba(30,45,69,0.7);transition:background 0.2s;cursor:pointer;}
  .participant:last-child{border-bottom:none;}
  .participant:hover{background:rgba(255,255,255,0.03);}
  .p-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;}
  .p-left{display:flex;align-items:center;gap:10px;}
  .p-avatar{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:white;flex-shrink:0;font-family:'IBM Plex Mono',monospace;}
  .p-name{font-size:14px;font-weight:600;color:var(--text);}
  .p-age{font-size:11px;color:var(--muted);font-family:'IBM Plex Mono',monospace;margin-top:1px;}
  .p-num{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--accent);opacity:0.7;}
  .p-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:2px;}
  .tag{font-size:10px;padding:2px 8px;border-radius:4px;font-family:'IBM Plex Mono',monospace;}
  .tag-job{background:rgba(124
